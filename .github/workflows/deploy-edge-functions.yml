name: Deploy Supabase Edge Functions

# Deploys edge functions whenever their source (or the JWT/config) changes on main.
# verify_jwt per function is declared in supabase/config.toml — keep it there so a
# deploy never silently flips a public webhook (e.g. generate-movie-video) to JWT-only.
on:
  push:
    branches: [main]
    paths:
      - "supabase/functions/**"
      - "supabase/config.toml"
      - ".github/workflows/deploy-edge-functions.yml"
  workflow_dispatch: {} # allow manual runs from the Actions tab

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy edge functions
        run: supabase functions deploy --project-ref "$PROJECT_ID"
