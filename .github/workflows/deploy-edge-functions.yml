name: Deploy Supabase Edge Functions

# Deploys ONLY the edge functions changed in a push — never the whole set. Deploying
# all functions fails the moment any single one in the repo has a stale/broken import
# graph, so we scope each run to what actually changed.
#
# verify_jwt per function is declared in supabase/config.toml — keep it there so a
# deploy never silently flips a public webhook (e.g. generate-movie-video) to JWT-only.
on:
  push:
    branches: [main]
    paths:
      - "supabase/functions/**"
  workflow_dispatch:
    inputs:
      functions:
        description: "Space-separated function names to deploy (e.g. 'elevenlabs-tts generate-movie-video')"
        required: false
        default: ""

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0 # full history so we can diff the pushed range

      - uses: supabase/setup-cli@v3
        with:
          version: latest

      - name: Determine functions to deploy
        id: pick
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            FUNCS="${{ github.event.inputs.functions }}"
          else
            BEFORE="${{ github.event.before }}"
            # First push to a branch (or force-push) may not have a valid `before` — diff the last commit.
            if ! git cat-file -e "${BEFORE}^{commit}" 2>/dev/null; then BEFORE="${{ github.event.after }}~1"; fi
            # _shared is imported BY functions (e.g. vertex.ts, awsSigV4.ts) — it isn't
            # a deployable function itself, and `supabase functions deploy _shared`
            # hard-fails ("Invalid Function name"), aborting the whole loop before any
            # real function gets deployed. Exclude it explicitly.
            FUNCS=$(git diff --name-only "$BEFORE" "${{ github.event.after }}" -- 'supabase/functions/' \
              | sed -nE 's#^supabase/functions/([^/]+)/.*#\1#p' | sort -u | grep -v '^_shared$' | tr '\n' ' ')
          fi
          echo "funcs=$FUNCS" >> "$GITHUB_OUTPUT"
          echo "Functions to deploy: '${FUNCS}'"

      - name: Deploy changed functions
        if: steps.pick.outputs.funcs != ''
        run: |
          for fn in ${{ steps.pick.outputs.funcs }}; do
            echo "::group::deploy $fn"
            supabase functions deploy "$fn" --project-ref "$PROJECT_ID"
            echo "::endgroup::"
          done
