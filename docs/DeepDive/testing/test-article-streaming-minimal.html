<!DOCTYPE html>
<html>
<head>
  <title>Article Streaming Test - Minimal</title>
  <style>
    body {
      font-family: monospace;
      padding: 20px;
      background: #1a1a1a;
      color: #00ff00;
    }
    #output {
      border: 2px solid #00ff00;
      padding: 20px;
      margin: 20px 0;
      white-space: pre-wrap;
      min-height: 200px;
    }
    button {
      padding: 10px 20px;
      font-size: 16px;
      background: #00ff00;
      color: #1a1a1a;
      border: none;
      cursor: pointer;
    }
    .stats {
      border: 1px solid yellow;
      padding: 10px;
      margin: 10px 0;
      background: #2a2a2a;
    }
  </style>
</head>
<body>
  <h1>Article Streaming Test - Minimal</h1>

  <button onclick="testStreaming()">Start Streaming</button>

  <div class="stats">
    <div>Chunks received: <span id="chunkCount">0</span></div>
    <div>Content length: <span id="contentLength">0</span></div>
    <div>Last chunk: <span id="lastChunk"></span></div>
  </div>

  <div id="output"></div>

  <script>
    let content = '';
    let chunkCount = 0;

    async function testStreaming() {
      console.log('[TEST] Starting streaming test');

      // Reset
      content = '';
      chunkCount = 0;
      document.getElementById('output').textContent = '';
      document.getElementById('chunkCount').textContent = '0';
      document.getElementById('contentLength').textContent = '0';
      document.getElementById('lastChunk').textContent = '';

      const title = 'OpenAI releases GPT-5';
      const snippet = 'OpenAI announces GPT-5 with improved reasoning capabilities';
      const url = 'https://example.com';

      const userMessage = `You are writing an in-depth article about: "${title}"

Context: ${snippet}

Requirements:
- Write a detailed article (600-1000 words) with multiple sections
- Use markdown formatting with headers (##), bullet points, and paragraphs
- Include key facts, context, implications, and analysis
- Make it engaging and easy to read
- Write the article directly as markdown text

Today's date: ${new Date().toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' })}`;

      try {
        const response = await fetch('https://ytccfmbzvcydsshkkbac.supabase.co/functions/v1/openai-llm', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': 'Bearer eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inl0Y2NmbWJ6dmN5ZHNzaGtrYmFjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3MzQxMTc1OTQsImV4cCI6MjA0OTY5MzU5NH0.gVLZoqI8Hm8DsFjy0PZp5VD09DQbF3KyQ8lX7CrZ76Q'
          },
          body: JSON.stringify({
            prompt: JSON.stringify({
              input: [{ role: 'user', content: userMessage }],
              model: 'gpt-5-mini',
              max_output_tokens: 2000,
              reasoning: { effort: 'low' }
            }),
            stream: true
          })
        });

        console.log('[TEST] Response received, status:', response.status);

        if (!response.ok) {
          throw new Error(`HTTP error: ${response.status}`);
        }

        const reader = response.body.getReader();
        const decoder = new TextDecoder();
        let buffer = '';

        console.log('[TEST] Starting to read stream...');

        while (true) {
          const { done, value } = await reader.read();

          if (done) {
            console.log('[TEST] Stream complete');
            break;
          }

          const decoded = decoder.decode(value, { stream: true });
          buffer += decoded;
          const lines = buffer.split('\n');
          buffer = lines.pop() || '';

          for (const line of lines) {
            if (!line.trim() || !line.startsWith('data: ')) continue;

            const data = line.slice(6);
            if (data === '[DONE]') continue;

            try {
              const json = JSON.parse(data);
              const chunk = json.content || json.delta || json.text || '';

              if (chunk && typeof chunk === 'string') {
                chunkCount++;
                content += chunk;

                // Update DOM directly - no React
                document.getElementById('output').textContent = content;
                document.getElementById('chunkCount').textContent = chunkCount;
                document.getElementById('contentLength').textContent = content.length;
                document.getElementById('lastChunk').textContent = chunk.substring(0, 30);

                console.log(`[CHUNK ${chunkCount}] "${chunk}"`);
              }
            } catch (e) {
              console.error('[TEST] Parse error:', e);
            }
          }
        }

        console.log(`[TEST] Complete! Total chunks: ${chunkCount}, Total length: ${content.length}`);

      } catch (error) {
        console.error('[TEST] Error:', error);
        document.getElementById('output').textContent = 'ERROR: ' + error.message;
      }
    }
  </script>
</body>
</html>
