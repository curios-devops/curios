<!DOCTYPE html>
<html>
<head>
  <title>Test Actual LLMProvider</title>
  <style>
    body { font-family: monospace; padding: 20px; max-width: 800px; margin: 0 auto; }
    #output { border: 1px solid #ccc; padding: 10px; min-height: 200px; white-space: pre-wrap; background: #f5f5f5; }
    button { padding: 10px 20px; font-size: 16px; cursor: pointer; }
    .log { margin: 2px 0; padding: 3px; background: #f0f0f0; font-size: 11px; }
  </style>
</head>
<body>
  <h1>Test: Import and Call Real LLMProvider</h1>
  <p>This imports the actual generateAnswerStreaming function from the app</p>

  <button onclick="testRealFunction()">Test Real LLMProvider</button>

  <h2>Output:</h2>
  <div id="output"></div>

  <h2>Logs:</h2>
  <div id="logs"></div>

  <script type="module">
    window.testRealFunction = async function() {
      document.getElementById('output').textContent = '';
      document.getElementById('logs').innerHTML = '';

      function log(message) {
        const logsDiv = document.getElementById('logs');
        const logEntry = document.createElement('div');
        logEntry.className = 'log';
        logEntry.textContent = `[${new Date().toISOString()}] ${message}`;
        logsDiv.appendChild(logEntry);
        console.log(message);
      }

      try {
        log('Importing generateAnswerStreaming from llmProvider...');

        const { generateAnswerStreaming } = await import('/src/services/fast-search/providers/llmProvider.ts');

        log('Function imported successfully');

        let chunkCount = 0;
        let fullText = '';

        log('Calling generateAnswerStreaming...');

        const result = await generateAnswerStreaming(
          {
            query: 'tell me about Elon Musk',
            webResults: [],
            images: [],
            videos: [],
            date: '2026-05-14',
            locale: 'en'
          },
          (chunk) => {
            chunkCount++;
            fullText += chunk;
            document.getElementById('output').textContent = fullText;
            log(`Chunk ${chunkCount}: ${chunk.length} chars`);
          }
        );

        log(`=== COMPLETE ===`);
        log(`Total chunks: ${chunkCount}`);
        log(`Total length: ${fullText.length}`);
        log(`Follow-ups: ${result.followUps.length}`);

      } catch (error) {
        log(`ERROR: ${error.message}`);
        log(`Stack: ${error.stack}`);
      }
    };
  </script>
</body>
</html>
