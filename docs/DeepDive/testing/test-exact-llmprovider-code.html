<!DOCTYPE html>
<html>
<head>
  <title>Exact LLMProvider Code Test</title>
  <style>
    body { font-family: monospace; padding: 20px; max-width: 800px; margin: 0 auto; }
    #output { border: 1px solid #ccc; padding: 10px; min-height: 200px; white-space: pre-wrap; background: #f5f5f5; }
    button { padding: 10px 20px; font-size: 16px; cursor: pointer; }
    .log { margin: 2px 0; padding: 3px; background: #f0f0f0; font-size: 11px; }
  </style>
</head>
<body>
  <h1>Test EXACT LLMProvider Code</h1>
  <p>This is line-by-line copy of generateAnswerStreaming from llmProvider.ts</p>

  <button onclick="testExactCode()">Test Streaming</button>

  <h2>Output:</h2>
  <div id="output"></div>

  <h2>Logs:</h2>
  <div id="logs"></div>

  <script>
    function log(message) {
      const logsDiv = document.getElementById('logs');
      const logEntry = document.createElement('div');
      logEntry.className = 'log';
      logEntry.textContent = `[${new Date().toISOString()}] ${message}`;
      logsDiv.appendChild(logEntry);
      console.log(message);
    }

    async function testExactCode() {
      document.getElementById('output').textContent = '';
      document.getElementById('logs').innerHTML = '';

      const supabaseEdgeUrl = 'https://gpfccicfqynahflehpqo.supabase.co/functions/v1/fetch-openai';
      const supabaseAnonKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdwZmNjaWNmcXluYWhmbGVocHFvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDIzMTg1MzksImV4cCI6MjA1Nzg5NDUzOX0.mG1MaCt62FdB3tDDV5dHEJeCJvWB5l96EyJQqTSjAd8';

      const userMessage = `Search the web and provide a comprehensive answer to: "tell me about Elon Musk"

Requirements:
- Use current web information to answer accurately
- Provide a clear, well-structured response in markdown format
- Include 3-5 relevant follow-up questions at the end

Today's date: 2026-05-14
Language: en`;

      const controller = new AbortController();
      const timeoutId = setTimeout(() => {
        log('TIMEOUT: Aborting request after 60s');
        controller.abort();
      }, 60000); // 60s timeout

      try {
        log('Starting fetch...');

        const response = await fetch(supabaseEdgeUrl, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${supabaseAnonKey}`
          },
          body: JSON.stringify({
            prompt: JSON.stringify({
              input: [
                { role: 'user', content: userMessage }
              ],
              model: 'gpt-5-mini',
              tools: [
                {
                  type: 'web_search',
                  search_context_size: 'low'
                }
              ],
              max_output_tokens: 2000,
              reasoning: { effort: 'low' }
            }),
            stream: true
          }),
          signal: controller.signal
        });

        log(`Response: ${response.status}`);

        if (!response.ok) {
          clearTimeout(timeoutId);
          const errorText = await response.text();
          log(`ERROR: ${errorText}`);
          throw new Error(`OpenAI API error: ${response.status}`);
        }

        const reader = response.body?.getReader();
        if (!reader) {
          clearTimeout(timeoutId);
          throw new Error('Failed to get response reader');
        }

        const decoder = new TextDecoder();
        let fullText = '';
        let buffer = '';

        log('Starting to read stream');

        let chunkCount = 0;
        let readIterations = 0;

        while (true) {
          readIterations++;
          log(`About to read chunk ${readIterations}`);

          const readPromise = reader.read();
          log(`reader.read() promise created ${readIterations}`);

          const { done, value } = await readPromise;

          log(`Read result ${readIterations}: done=${done}, hasValue=${!!value}, length=${value?.length || 0}`);

          if (done) {
            log(`Stream complete! Chunks: ${chunkCount}, Length: ${fullText.length}`);
            break;
          }

          buffer += decoder.decode(value, { stream: true });
          const lines = buffer.split('\n');
          buffer = lines.pop() || '';

          log(`Processing lines: ${readIterations}, lineCount=${lines.length}, bufferLength=${buffer.length}`);

          for (const line of lines) {
            if (!line.trim()) continue;

            if (!line.startsWith('data: ')) {
              log(`WARN: Unexpected line format: ${line.substring(0, 100)}`);
              continue;
            }

            const data = line.slice(6);
            if (data === '[DONE]') {
              log('Received DONE signal');
              continue;
            }

            try {
              const json = JSON.parse(data);
              const content = json.content || json.delta || json.text || '';

              if (content && typeof content === 'string') {
                chunkCount++;
                fullText += content;

                log(`Calling onChunk: chunkCount=${chunkCount}, contentLength=${content.length}`);

                // Mimic React setState
                document.getElementById('output').textContent += content;

                log(`onChunk returned: chunkCount=${chunkCount}`);

                if (chunkCount === 1) {
                  log(`First chunk received: length=${content.length}`);
                }
                if (chunkCount % 10 === 0) {
                  log(`Progress: ${chunkCount} chunks, ${fullText.length} chars`);
                }
              } else {
                log(`Chunk with no content: ${JSON.stringify(json)}`);
              }
            } catch (parseError) {
              log(`WARN: Parse error: ${parseError.message}, data: ${data.substring(0, 200)}`);
            }
          }

          log(`End of iteration ${readIterations}, chunkCount=${chunkCount}`);
        }

        // Clear timeout after successful completion
        clearTimeout(timeoutId);

        log(`=== STREAMING COMPLETE ===`);
        log(`Total chunks: ${chunkCount}`);
        log(`Total length: ${fullText.length}`);

      } catch (error) {
        clearTimeout(timeoutId);
        log(`ERROR: ${error.message}`);
        log(`Stack: ${error.stack}`);
      }
    }
  </script>
</body>
</html>
