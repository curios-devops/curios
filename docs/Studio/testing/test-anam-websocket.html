<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Test Anam WebSocket Connection</title>
  <style>
    body {
      font-family: system-ui, -apple-system, sans-serif;
      max-width: 900px;
      margin: 50px auto;
      padding: 20px;
      background: #0a0a0a;
      color: #ffffff;
    }
    h1 {
      color: #a855f7;
    }
    button {
      background: linear-gradient(135deg, #a855f7 0%, #3b82f6 100%);
      color: white;
      border: none;
      padding: 12px 24px;
      font-size: 16px;
      border-radius: 8px;
      cursor: pointer;
      margin: 10px 5px;
    }
    button:hover {
      opacity: 0.9;
    }
    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    #logs {
      margin: 20px 0;
      padding: 15px;
      background: #111111;
      border: 1px solid #333;
      border-radius: 8px;
      min-height: 300px;
      max-height: 500px;
      overflow-y: auto;
      font-family: monospace;
      font-size: 13px;
    }
    .log-entry {
      margin: 5px 0;
      padding: 5px;
      border-left: 3px solid #666;
      padding-left: 10px;
    }
    .log-info { border-left-color: #3b82f6; color: #60a5fa; }
    .log-success { border-left-color: #10b981; color: #34d399; }
    .log-error { border-left-color: #ef4444; color: #f87171; }
    .log-debug { border-left-color: #6b7280; color: #9ca3af; }
    .info {
      background: #1a1a2e;
      padding: 15px;
      border-radius: 8px;
      margin: 20px 0;
      border-left: 4px solid #a855f7;
    }
    #video {
      max-width: 512px;
      width: 100%;
      border-radius: 12px;
      margin: 20px 0;
      background: #111;
    }
  </style>
</head>
<body>
  <h1>🎭 Test Anam WebSocket Connection</h1>

  <div class="info">
    <strong>Test Steps:</strong>
    <ol>
      <li>Get API key from Supabase</li>
      <li>Connect to Anam WebSocket</li>
      <li>Send test audio</li>
      <li>Receive video frames</li>
    </ol>
  </div>

  <div>
    <button onclick="testConnection()" id="testBtn">🔌 Test WebSocket Connection</button>
    <button onclick="clearLogs()">🗑️ Clear Logs</button>
  </div>

  <div id="logs"></div>

  <video id="video" controls style="display: none;"></video>

  <script>
    const SUPABASE_URL = 'https://gpfccicfqynahflehpqo.supabase.co';
    let ws = null;

    function log(message, type = 'info') {
      const logsDiv = document.getElementById('logs');
      const timestamp = new Date().toLocaleTimeString();
      const entry = document.createElement('div');
      entry.className = `log-entry log-${type}`;
      entry.textContent = `[${timestamp}] ${message}`;
      logsDiv.appendChild(entry);
      logsDiv.scrollTop = logsDiv.scrollHeight;
      console.log(`[${type.toUpperCase()}] ${message}`);
    }

    function clearLogs() {
      document.getElementById('logs').innerHTML = '';
      log('Logs cleared', 'info');
    }

    async function testConnection() {
      const btn = document.getElementById('testBtn');
      btn.disabled = true;

      try {
        log('🎭 Starting Anam WebSocket test...', 'info');

        // Step 1: Get API key from Supabase
        log('📡 Getting API key from Supabase...', 'info');
        const response = await fetch(`${SUPABASE_URL}/functions/v1/get-anam-token`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({})
        });

        if (!response.ok) {
          throw new Error(`Failed to get API key: ${response.status}`);
        }

        const { apiKey, wsUrl } = await response.json();
        log(`✅ API key received: ${apiKey.substring(0, 20)}...`, 'success');
        log(`📍 WebSocket URL: ${wsUrl}`, 'info');

        // Step 2: Connect to Anam WebSocket
        log('🔌 Connecting to Anam WebSocket...', 'info');
        const wsUrlWithKey = `${wsUrl}?api_key=${encodeURIComponent(apiKey)}`;

        ws = new WebSocket(wsUrlWithKey);

        ws.onopen = () => {
          log('✅ WebSocket connected!', 'success');
          log('🎯 Connection to Anam established', 'success');

          // Step 3: Try to send a simple message
          log('📤 Sending test message...', 'info');
          ws.send(JSON.stringify({
            type: 'test',
            message: 'Hello from CuriosAI'
          }));
        };

        ws.onmessage = (event) => {
          log(`📨 Message received from Anam`, 'info');

          if (event.data instanceof Blob) {
            log(`📹 Video frame received (${event.data.size} bytes)`, 'success');
          } else {
            try {
              const data = JSON.parse(event.data);
              log(`📋 JSON message: ${JSON.stringify(data)}`, 'debug');
            } catch {
              log(`📋 Text message: ${event.data}`, 'debug');
            }
          }
        };

        ws.onerror = (error) => {
          log(`❌ WebSocket error: ${error}`, 'error');
          console.error('WebSocket error:', error);
        };

        ws.onclose = (event) => {
          log(`🔌 WebSocket closed (code: ${event.code}, reason: ${event.reason || 'none'})`, 'info');
          btn.disabled = false;
        };

      } catch (error) {
        log(`❌ Error: ${error.message}`, 'error');
        console.error('Test error:', error);
        btn.disabled = false;
      }
    }

    // Cleanup on page unload
    window.addEventListener('beforeunload', () => {
      if (ws) {
        ws.close();
      }
    });
  </script>
</body>
</html>
