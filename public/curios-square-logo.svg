<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 200 200" fill-rule="evenodd">
  <title>Modified C Logo</title>
  <desc>Logo with horizontal right cut (50x40)</desc>

  <!-- Cutouts mask: white = keep, black = transparent hole -->
  <mask id="logo-cutouts">
    <rect x="0" y="0" width="200" height="200" fill="white"/>
    <rect x="40" y="40" width="120" height="120" rx="30" ry="30" fill="black"/>
    <rect x="150" y="80" width="40" height="40" fill="black"/>
  </mask>

  <!-- Base shape with transparent cutouts -->
  <rect x="10" y="10" width="180" height="180" rx="40" ry="40" fill="black" mask="url(#logo-cutouts)"/>
  <rect x="70" y="70" width="60" height="60" rx="20" ry="20" fill="black"/>
</svg>
