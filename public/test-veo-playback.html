<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="data:," />
    <title>Veo Barebones Generator Test</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      }
      body {
        margin: 0;
        background: #0b0f14;
        color: #e5e7eb;
      }
      .wrap {
        min-height: 100vh;
        display: grid;
        grid-template-columns: 1fr 1.5fr;
        gap: 16px;
        padding: 16px;
        box-sizing: border-box;
      }
      .card {
        background: #111827;
        border: 1px solid #1f2937;
        border-radius: 12px;
        padding: 16px;
      }
      h1 {
        margin: 0 0 8px;
        font-size: 20px;
      }
      p {
        margin: 0 0 12px;
        line-height: 1.5;
      }
      .controls {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 8px;
        margin-bottom: 10px;
      }
      textarea {
        background: #0f172a;
        border: 1px solid #334155;
        color: #e5e7eb;
        border-radius: 8px;
        padding: 10px;
        min-height: 120px;
        resize: vertical;
        width: 100%;
        box-sizing: border-box;
        margin-bottom: 10px;
      }
      input {
        background: #0f172a;
        border: 1px solid #334155;
        color: #e5e7eb;
        border-radius: 8px;
        padding: 10px;
      }
      button, a {
        border: 1px solid #334155;
        background: #1e293b;
        color: #e5e7eb;
        padding: 10px 12px;
        border-radius: 8px;
        cursor: pointer;
        text-decoration: none;
      }
      video {
        width: 100%;
        max-height: 70vh;
        border-radius: 10px;
        border: 1px solid #1f2937;
        background: #000;
      }
      .note {
        opacity: 0.8;
        font-size: 12px;
        margin-top: 8px;
      }
      .status-pill {
        display: inline-block;
        padding: 4px 8px;
        border-radius: 999px;
        border: 1px solid #334155;
        font-size: 12px;
        margin-bottom: 10px;
      }
      .busy {
        color: #fde68a;
        border-color: #b45309;
        background: #422006;
      }
      .ok {
        color: #86efac;
        border-color: #166534;
        background: #052e16;
      }
      .err {
        color: #fecaca;
        border-color: #991b1b;
        background: #450a0a;
      }
      @media (max-width: 900px) {
        .wrap {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main class="wrap">
      <section class="card">
        <h1>Prompt Card</h1>
        <p>
          Write or edit your video prompt, then click <strong>Generate Video</strong>.
          This calls your deployed Supabase function and waits for completion.
        </p>

        <textarea id="promptInput">A bird's-eye view of a vast, intricate maze made of high green hedges. A lone figure in a red coat is visible, moving through the labyrinthine paths below.</textarea>

        <div class="controls">
          <input id="functionUrl" type="text" value="https://gpfccicfqynahflehpqo.supabase.co/functions/v1/veo-generate-video" />
          <button id="generateBtn" type="button">Generate Video</button>
        </div>

        <p class="note">Tip: keep prompts short while testing to reduce wait time.</p>
      </section>

      <section class="card">
        <h1>Generation Output</h1>
        <div id="statusPill" class="status-pill">Idle</div>

        <div class="controls">
          <input id="videoUrl" type="text" placeholder="Final public video URL will appear here" />
          <a id="downloadLink" href="#" download>Download</a>
        </div>

        <video id="player" controls preload="metadata"></video>
        <p id="status" class="note">Waiting to generate...</p>
      </section>
    </main>

    <script>
      const promptInput = document.getElementById('promptInput');
      const functionUrlInput = document.getElementById('functionUrl');
      const generateBtn = document.getElementById('generateBtn');
      const input = document.getElementById('videoUrl');
      const player = document.getElementById('player');
      const downloadLink = document.getElementById('downloadLink');
      const statusPill = document.getElementById('statusPill');
      const status = document.getElementById('status');

      let currentOperation = null;
      let currentObjectUrl = null;

      function setStatus(kind, text) {
        status.textContent = text;
        statusPill.textContent = text;
        statusPill.className = 'status-pill';
        if (kind === 'busy') statusPill.classList.add('busy');
        if (kind === 'ok') statusPill.classList.add('ok');
        if (kind === 'err') statusPill.classList.add('err');
      }

      function loadVideo(urlFromArg) {
        const resolvedUrl = (urlFromArg || input.value || '').trim();
        if (!resolvedUrl) {
          setStatus('err', 'No video URL available.');
          return;
        }

        player.src = resolvedUrl;
        downloadLink.href = resolvedUrl;
        setStatus('ok', 'Video ready. Press play or download.');
      }

      function loadVideoFromBase64(base64Data, mimeType) {
        if (currentObjectUrl) {
          URL.revokeObjectURL(currentObjectUrl);
          currentObjectUrl = null;
        }

        const binary = atob(base64Data);
        const bytes = new Uint8Array(binary.length);
        for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
        const type = mimeType || 'video/mp4';
        const blob = new Blob([bytes], { type });

        currentObjectUrl = URL.createObjectURL(blob);
        player.src = currentObjectUrl;
        input.value = '(inline video bytes rendered locally)';
        downloadLink.href = currentObjectUrl;
        downloadLink.download = `veo-local-${Date.now()}.mp4`;
        setStatus('ok', 'Video ready from inline bytes. Press play or download.');
      }

      async function callFunction(payload) {
        const functionUrl = functionUrlInput.value.trim();
        const response = await fetch(functionUrl, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });
        const rawText = await response.text();
        let data = null;
        try {
          data = rawText ? JSON.parse(rawText) : null;
        } catch (_parseError) {
          data = null;
        }
        if (!response.ok || data.success === false) {
          const detail = data?.error || rawText?.slice(0, 250) || 'no response body';
          throw new Error(`HTTP ${response.status}: ${detail}`);
        }
        return data;
      }

      async function waitUntilDone(operationName) {
        const maxAttempts = 30;
        for (let attempt = 1; attempt <= maxAttempts; attempt++) {
          setStatus('busy', `Generating video... check ${attempt}/${maxAttempts}`);
          const result = await callFunction({ action: 'check', operationName });
          if (result.done) return result;
          await new Promise((resolve) => setTimeout(resolve, 10000));
        }
        throw new Error('Timed out waiting for video generation.');
      }

      function resolveVideoOutput(result) {
        if (result.videoUrl) {
          return { kind: 'url', value: result.videoUrl };
        }
        if (result.videoBase64) {
          return { kind: 'inline', value: result.videoBase64, mimeType: result.mimeType || 'video/mp4' };
        }
        throw new Error('No videoUrl or videoBase64 in completed result.');
      }

      async function onGenerate() {
        try {
          const prompt = promptInput.value.trim();
          if (!prompt) {
            setStatus('err', 'Prompt is required.');
            return;
          }

          generateBtn.disabled = true;
          input.value = '';
          player.removeAttribute('src');
          player.load();
          downloadLink.href = '#';

          setStatus('busy', 'Starting generation...');
          const started = await callFunction({ action: 'generate', prompt, aspectRatio: '16:9' });
          currentOperation = started.operation;

          const doneResult = await waitUntilDone(currentOperation);
          const output = resolveVideoOutput(doneResult);

          if (output.kind === 'url') {
            input.value = output.value;
            loadVideo(output.value);
          } else {
            loadVideoFromBase64(output.value, output.mimeType);
          }
        } catch (error) {
          setStatus('err', `Error: ${error.message || error}`);
        } finally {
          generateBtn.disabled = false;
        }
      }

      generateBtn.addEventListener('click', onGenerate);

      player.addEventListener('error', () => {
        setStatus('err', 'Error loading video (check URL/CORS/public access).');
      });
      player.addEventListener('canplay', () => {
        if (!statusPill.classList.contains('ok')) {
          setStatus('ok', 'Ready to play.');
        }
      });

      const params = new URLSearchParams(location.search);
      const presetUrl = params.get('url');
      if (presetUrl) {
        input.value = presetUrl;
        loadVideo();
      }
    </script>
  </body>
</html>
